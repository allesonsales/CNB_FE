<nav *ngIf="!isMobile">
  <img src="assets/images/marca.png" alt="CNB" />
  <div class="botao-centro">
    <button>Consultar</button>
    <button>Sobre o CNB</button>
    <button>Download CNB</button>
  </div>
  <div class="botao-direita">
    <button>
      <ion-icon name="search"></ion-icon>
      Nova consulta
    </button>
  </div>
</nav>

<nav class="mobile" *ngIf="isMobile">
  <img src="assets/images/marca.png" alt="CNB" />
  <ion-button>
    <ion-icon name="menu-outline"></ion-icon>
  </ion-button>
</nav>

<app-consulta-publica-bicicleta-nao-encontrada
  *ngIf="bicicleta == null"
></app-consulta-publica-bicicleta-nao-encontrada>

<app-consulta-publica-bicicleta-roubada
  [bicicleta]="bicicleta"
  *ngIf="bicicleta && bicicleta.status ==  statusBicicleta.ROUBADA"
></app-consulta-publica-bicicleta-roubada>

<app-consulta-publica-bicicleta-autenticada
  *ngIf="bicicleta"
  [bicicleta]="bicicleta"
>
</app-consulta-publica-bicicleta-autenticada>
<app-background></app-background>
