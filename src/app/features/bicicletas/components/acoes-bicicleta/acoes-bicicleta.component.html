<ion-content class="ion-padding">
  <ion-list class="list-container">
    <ion-item
      (click)="irPara('/bicicleta', bicicleta.numeroSerie)"
      [detailIcon]="false"
      >Ver detalhes</ion-item
    >
    <ion-item
      (click)="abrirModalTransferencia()"
      [detailIcon]="false"
      *ngIf="bicicleta.status != bicicletaStatus.ROUBADA"
      >Transferir bicicleta</ion-item
    >
    <ion-item
      (click)="autenticarBicicleta(bicicleta.numeroSerie)"
      [detailIcon]="false"
      >Autenticar propriedade</ion-item
    >
    <ion-item
      (click)="abrirModalRoubo()"
      [detailIcon]="false"
      *ngIf="bicicleta.status != bicicletaStatus.ROUBADA"
      >Marcar como roubada</ion-item
    >
    <ion-item
      (click)="abrirAlertaRecuperada()"
      [detailIcon]="false"
      *ngIf="bicicleta.status == bicicletaStatus.ROUBADA"
      >Marcar como recuperada</ion-item
    >
    <ion-item
      (click)="abrirModalEditar()"
      [detailIcon]="false"
      *ngIf="bicicleta.status != bicicletaStatus.ROUBADA"
      >Editar</ion-item
    >
    <ion-item (click)="abrirAlertaExcluir()" [detailIcon]="false"
      >Excluir</ion-item
    >
  </ion-list>
</ion-content>
