<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="voltar()">
        <ion-icon name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Perfil</ion-title></ion-toolbar
  >
</ion-header>

<ion-content [fullscreen]="true">
  <div class="container">
    <app-header-perfil [dadosPerfil]="perfil"></app-header-perfil>
    @if (perfil?.amizade?.status == statusAmizade.ACEITA || perfil?.isMeuPerfil)
    {
    <app-tab-social
      [segmentos]="segmentos"
      (acao)="onAcao($event)"
    ></app-tab-social>

    @switch (abaAtiva) { @case ('fotos') {
    <app-fotos-perfil></app-fotos-perfil>
    } @case ('grupos') {
    <app-grupos-perfil></app-grupos-perfil>
    } @case ('conquistas') {
    <app-conquistas-perfil></app-conquistas-perfil>
    } } } @else {
    <div class="container-block">
      <ion-icon name="lock-closed-outline"></ion-icon>
      <span>Adicione o usuário para ver o seu conteúdo.</span>
    </div>
    }
  </div>
</ion-content>
