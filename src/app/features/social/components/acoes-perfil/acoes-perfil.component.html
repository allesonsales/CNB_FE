<ion-content class="ion-padding">
  <ion-list class="list-container">
    @if (!isMeuPerfil) {
      @if (amizadeStatus != null) {
        <ion-item [detailIcon]="false">Desfazer amizade</ion-item>
      }
      <ion-item [detailIcon]="false">Denúnciar</ion-item>
    } @else {
      <ion-item [detailIcon]="false" (click)="editarPerfil()"
        >Editar perfil</ion-item
      >
    }
  </ion-list>
</ion-content>
