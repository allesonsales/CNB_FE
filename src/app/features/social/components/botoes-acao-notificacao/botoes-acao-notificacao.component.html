<div
  class="notificacao-right-container"
  *ngIf="
    tipoNotificacao === notificacaoTipo.TRANSACAO_AGUARDANDO_ACEITE_COMPRADOR ||
    tipoNotificacao == notificacaoTipo.TRANSACAO_AGUARDANDO_CONFIRMACAO_VENDEDOR
  "
>
  <div class="acao-container aceite">
    <ion-button (click)="emitirAcaoCancelar()">
      <ion-icon name="close"></ion-icon>
    </ion-button>
    <ion-button (click)="emitirAcaoAceitar()">
      <ion-icon name="checkmark"></ion-icon>
    </ion-button>
  </div>
</div>
