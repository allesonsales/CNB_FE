<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="home" [routerLink]="['/home']">
      <ion-icon name="home"></ion-icon>
    </ion-tab-button>

    <ion-tab-button tab="bicicletas" [routerLink]="['/bicicletas']">
      <ion-icon name="bicycle"></ion-icon>
    </ion-tab-button>

    <ion-tab-button tab="notificacoes" [routerLink]="['/notificacoes']">
      <ion-badge>{{ quantidadeNotificacoes() }}</ion-badge>
      <ion-icon name="heart"></ion-icon>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
